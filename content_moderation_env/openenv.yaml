# yaml-language-server: $schema=https://openenv.ai/schema.json
version: "1.0"

environment:
  name: "content_moderation_env"
  description: "AI Content Moderation Environment simulating real-world social media moderation scenarios with dense rewards."
  author: "Croma"

docker:
  build_context: "."
  dockerfile: "Dockerfile"

schemas:
  observation:
    type: "object"
    properties:
      post_id:
        type: "string"
        description: "Unique string identifying the internal content."
      post_body:
        type: "string"
        description: "String contents of the post to evaluate."
      metadata:
        type: "object"
        properties:
          timestamp: { type: "string" }
          reports_count: { type: "integer" }
          author_trust_score: { type: "number" }
          account_age_days: { type: "integer" }
      context:
        type: "array"
        items:
          type: "string"
        description: "Array of historical user actions/flags."
  
  action:
    type: "object"
    properties:
      decision:
        type: "string"
        enum: ["ALLOW", "FLAG", "REMOVE", "ESCALATE"]
      reasoning:
        type: "string"
        description: "Internal AI step rationale for taking action."
      confidence_score:
        type: "number"
        minimum: 0.0
        maximum: 1.0

tasks:
  - id: "easy_spam"
    difficulty: "easy"
    description: "Evaluates the agent's absolute classification ability on repetitive spam inputs."
    data_file: "datasets/easy_spam.json"
    
  - id: "medium_toxic"
    difficulty: "medium"
    description: "Evaluates context resolution between hyperbolic social behavior and actual policy-violating hate speech."
    data_file: "datasets/medium_toxic.json"
    
  - id: "hard_mixed"
    difficulty: "hard"
    description: "Requires advanced escalation metrics evaluating dangerous political instability, unverified reporting, and hyper-ambiguity."
    data_file: "datasets/hard_mixed.json"

metadata:
  tags:
    - "trust-and-safety"
    - "meta-hackathon"
    - "content-moderation"
  license: "MIT"
  entrypoint: "env:ContentModerationEnv"
